{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div
    style="min-height:calc(100vh - var(--nav-height));display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px;">
    <div>
        <div
            style="font-size:6rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;">
            404</div>
        <h1 style="font-size:1.5rem;font-weight:700;margin:16px 0 10px;">Page Not Found</h1>
        <p style="color:var(--text-secondary);margin-bottom:28px;">The page you're looking for doesn't exist or has been
            moved.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
            <a href="{{ url_for('main.index') }}" class="btn btn-primary">🏠 Go Home</a>
            <a href="{{ url_for('jobs.list_jobs') }}" class="btn btn-ghost">Browse Jobs</a>
        </div>
    </div>
</div>
{% endblock %}
