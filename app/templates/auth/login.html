{% extends "base.html" %}
{% block title %}Login — LocalFreelance{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="card">
            <div class="auth-logo">
                <div
                    style="width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent-light));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 12px;box-shadow:0 0 30px var(--accent-glow);">
                    ⚡</div>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-sub">Sign in to your LocalFreelance account</p>

            <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
                <div class="form-group">
                    <label for="identifier">Username or Email</label>
                    <input type="text" id="identifier" name="identifier" class="form-control"
                        placeholder="Enter your username or email" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                    <label
                        style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-weight:500;cursor:pointer;">
                        <input type="checkbox" name="remember"
                            style="width:16px;height:16px;accent-color:var(--accent);">
                        Remember me
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg">Sign In →</button>
            </form>

            <div class="auth-divider">or</div>

            <div class="auth-footer">
                Don't have an account? <a href="{{ url_for('auth.register') }}"
                    style="color:var(--accent-light);font-weight:600;">Create one free</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
